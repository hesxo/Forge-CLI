name: Forge CLI Publisher CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Show pnpm version
        run: pnpm -v

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Show package name + version
        run: |
          node -p "require('./package.json').name + '@' + require('./package.json').version"

      - name: Validate publish target
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if [ "$NAME" != "@hesxo/forge-cli" ]; then
            echo "Refusing to publish unexpected package name: $NAME"
            echo "Expected package name: @hesxo/forge-cli"
            exit 1
          fi
          echo "Publishing target validated: $NAME@$VER"

      - name: Fail if version already exists on npm
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already exists on npm. Bump version and push a new tag."
            exit 1
          fi
          echo "$NAME@$VER not found on npm. Continuing."

      - name: Check NPM token (non-blocking)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "WARNING: GitHub Actions secret NPM_TOKEN is not set or is empty."
            echo "npm publish will likely fail with ENEEDAUTH or E403 without valid credentials."
          fi

      - name: Validate npm auth identity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is empty. Cannot publish."
            exit 1
          fi
          USERNAME=$(npm whoami 2>/dev/null || true)
          if [ -z "$USERNAME" ]; then
            echo "npm authentication failed. Check NPM_TOKEN in the 'release' environment."
            exit 1
          fi
          if [ "$USERNAME" != "hesxo" ]; then
            echo "Authenticated as '$USERNAME' but expected 'hesxo'."
            echo "Use an npm token from the owner account for @hesxo/forge-cli."
            exit 1
          fi
          echo "npm auth OK as $USERNAME"

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
